name: Generate Portfolio News (DCT-2)

on:
  schedule:
    # 毎月1日 午前9時 JST（= UTC 00:00）に実行
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      target_months:
        description: '対象月（例: 202602 または 202601,202602）空欄=全月'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      FUND_ID: dct2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch sheet data
        run: node scripts/fetch-sheet.js
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Classify with Claude API
        run: node scripts/classify.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fetch OGP images
        run: node scripts/fetch-ogp.js

      - name: Generate HTML
        run: node scripts/generate-html.js
        env:
          TARGET_MONTHS: ${{ github.event.inputs.target_months }}

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git diff --name-only -- docs/)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "[INFO] docs/ に変更なし — PRは作成しません"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-news"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add docs/
          git commit -m "chore: update portfolio news"
          git push -f origin "$BRANCH"

          # 既存PRがあればスキップ、なければ作成
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "[INFO] 既存PR #$EXISTING を更新しました"
          else
            gh pr create \
              --title "ニュース更新プレビュー" \
              --body "$(cat <<'EOF'
          スプレッドシートBの最新データからHTMLを生成しました。

          **確認手順:**
          1. 下の Files changed タブでHTMLの差分を確認
          2. OKならこのPRをマージ → サイトに公開されます

          対象月: ${{ github.event.inputs.target_months || '全月' }}
          EOF
          )"
            echo "[INFO] PRを作成しました"
          fi
